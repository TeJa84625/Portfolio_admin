<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .input-error {
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
        }
    </style>
</head>

<body class="bg-gray-100 text-gray-900 font-sans min-h-screen p-6">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-lg shadow-lg">
        <h1 class="text-4xl text-blue-700 text-center font-bold mb-8">Static HTML Generator</h1>

        <div class="border-t pt-6 mt-6 p-8">
            <button type="button" id="importJsonBtn"
                class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 px-4 rounded-md transition">
                Import Project Data (JSON)
            </button>
        </div>

        <div id="jsonModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white p-6 rounded-lg w-full max-w-lg">
                <h2 class="text-xl font-bold mb-4">Paste Project JSON</h2>
                <textarea id="jsonInput" rows="10" class="w-full p-2 border rounded-md"></textarea>
                <div class="flex justify-end gap-2 mt-4">
                    <button onclick="document.getElementById('jsonModal').classList.add('hidden')"
                        class="px-4 py-2 bg-gray-300 rounded">Cancel</button>
                    <button id="processImportBtn" class="px-4 py-2 bg-blue-600 text-white rounded">Import</button>
                </div>
            </div>
        </div>

        <form id="projectForm" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Project Name</label>
                    <input type="text" id="projectName" class="mt-1 p-2 w-full border border-gray-300 rounded-md"
                        placeholder="e.g. AI Robotics Arm" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Project ID (Auto-generated / Database Key)</label>
                    <input type="text" id="projectId" class="mt-1 p-2 w-full border border-gray-300 rounded-md transition-colors"
                        placeholder="e.g. ai_robotics_arm" required>
                    <p id="projectIdHelp" class="text-xs text-gray-500 mt-1">Must be unique. Checked against Firebase on blur.</p>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Short Description</label>
                <textarea id="shortDescription" rows="2" class="mt-1 p-2 w-full border border-gray-300 rounded-md"
                    required></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Long Description</label>
                <textarea id="longDescription" rows="4" class="mt-1 p-2 w-full border border-gray-300 rounded-md"
                    required></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Upload Date</label>
                    <input type="date" id="uploadDate" class="mt-1 p-2 w-full border border-gray-300 rounded-md">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Last Updated</label>
                    <input type="date" id="lastUpdated" class="mt-1 p-2 w-full border border-gray-300 rounded-md">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Project Status</label>
                    <select id="projectStatus" class="mt-1 p-2 w-full border border-gray-300 rounded-md">
                        <option value="Completed">Completed</option>
                        <option value="Ongoing">Ongoing</option>
                        <option value="Upcoming">Upcoming</option>
                        <option value="On Hold">On Hold</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Difficulty</label>
                    <select id="difficulty" class="mt-1 p-2 w-full border border-gray-300 rounded-md">
                        <option value="Beginner">Beginner</option>
                        <option value="Intermediate">Intermediate</option>
                        <option value="Advanced">Advanced</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 border-t pt-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Image URLs</label>
                    <div id="imageUrlsContainer" class="space-y-2 mb-2"></div>
                    <button type="button" id="addImageBtn" class="text-sm text-blue-600 hover:underline">+ Add Image
                        URL</button>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Tags</label>
                    <div id="tagsContainer" class="space-y-2 mb-2"></div>
                    <button type="button" id="addTagBtn" class="text-sm text-blue-600 hover:underline">+ Add
                        Tag</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 border-t pt-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Technologies</label>
                    <div id="technologiesContainer" class="space-y-2 mb-2"></div>
                    <button type="button" id="addTechBtn" class="text-sm text-blue-600 hover:underline">+ Add
                        Technology</button>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Members</label>
                    <div id="membersContainer" class="space-y-2 mb-2"></div>
                    <button type="button" id="addMemberBtn" class="text-sm text-blue-600 hover:underline">+ Add
                        Member</button>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Sponsors</label>
                    <div id="sponsorsContainer" class="space-y-2 mb-2"></div>
                    <button type="button" id="addSponsorBtn" class="text-sm text-blue-600 hover:underline">+ Add
                        Sponsor</button>
                </div>
            </div>

            <div class="border-t pt-4">
                <label class="block text-sm font-medium text-gray-700">YouTube Video URL</label>
                <input type="text" id="videoUrl" class="mt-1 p-2 w-full border border-gray-300 rounded-md"
                    placeholder="https://youtube.com/...">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Button Label</label>
                    <select id="buttonLabel" class="mt-1 p-2 w-full border border-gray-300 rounded-md">
                        <option value="None">None</option>
                        <option value="Download">Download</option>
                        <option value="Visit Website">Visit Website</option>
                    </select>
                </div>
                <div id="buttonUrlContainer" style="display: none;">
                    <label class="block text-sm font-medium text-gray-700">Action Button URL</label>
                    <input type="text" id="buttonUrl" class="mt-1 p-2 w-full border border-gray-300 rounded-md"
                        placeholder="https://github.com/...">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Code Snippet (Optional)</label>
                <textarea id="code" rows="5"
                    class="mt-1 p-2 w-full border border-gray-300 rounded-md font-mono text-sm bg-gray-50"
                    placeholder="Paste code here..."></textarea>
            </div>

            <div class="border-t pt-6 mt-6 flex flex-col sm:flex-row gap-4">
                <button type="button" id="generateStaticBtn"
                    class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded-md shadow-lg transition">
                    Download Static HTML
                </button>
            </div>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script type="module" src="admin.js"></script>
</body>
